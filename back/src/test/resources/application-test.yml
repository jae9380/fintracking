spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: always

jwt:
  secret: test-jwt-secret-key-must-be-at-least-32-characters
  access-expiration: 3600000
  refresh-expiration: 604800000

encryption:
  aes-key: test-aes-256-key-padding-1234567

kakao:
  client-id: test-kakao-client-id
  redirect-uri: http://localhost:8080/test
